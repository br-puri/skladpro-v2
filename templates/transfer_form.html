{% extends 'base.html' %}
{% block title %}New Transfer{% endblock %}
{% block page_title %}New Stock Transfer{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('transfers') }}" class="back-link">← Back</a>{% endblock %}
{% block content %}
<form method="post" class="form-card">
  <div class="form-group">
    <label class="form-label">Product *</label>
    <select name="product_id" class="form-control" required>
      <option value="">— Select product —</option>
      {% for p in products %}<option value="{{ p['id'] }}">{{ p['name'] }} ({{ p['sku'] }})</option>{% endfor %}
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">From Warehouse *</label>
      <select name="from_wh_id" class="form-control" required>
        {% for w in warehouses %}<option value="{{ w['id'] }}" {{ 'selected' if w['id'] == default_wh_id }}>{{ w['name'] }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">To Warehouse *</label>
      <select name="to_wh_id" class="form-control" required>
        {% for w in warehouses %}<option value="{{ w['id'] }}" {{ 'selected' if w['id'] == default_wh_id }}>{{ w['name'] }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Quantity *</label>
      <input name="qty" type="number" min="0.01" step="0.01" class="form-control" value="1" required>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input name="doc_date" type="date" class="form-control" value="{{ today }}">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Notes</label>
    <input name="notes" class="form-control" placeholder="Optional notes">
  </div>
  <div style="margin-top:20px;display:flex;gap:8px">
    <button type="submit" class="btn btn-primary">Create Transfer</button>
    <a href="{{ url_for('transfers') }}" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
