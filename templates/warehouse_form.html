{% extends 'base.html' %}
{% block title %}{{ 'Edit' if wh else 'Add' }} Warehouse{% endblock %}
{% block page_title %}{{ 'Edit' if wh else 'Add' }} Warehouse{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('warehouses') }}" class="back-link">← Back</a>{% endblock %}
{% block content %}
<form method="post" class="form-card">
  <div class="form-group">
    <label class="form-label">Warehouse Name *</label>
    <input name="name" class="form-control" value="{{ wh['name'] if wh else '' }}" required placeholder="e.g. Main Warehouse">
  </div>
  <div class="form-group">
    <label class="form-label">Location</label>
    <input name="location" class="form-control" value="{{ wh['location'] if wh else '' }}" placeholder="City, Street">
  </div>
  <div style="margin-top:20px;display:flex;gap:8px">
    <button type="submit" class="btn btn-primary">{{ 'Save' if wh else 'Add Warehouse' }}</button>
    <a href="{{ url_for('warehouses') }}" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
