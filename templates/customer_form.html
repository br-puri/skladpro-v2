{% extends 'base.html' %}
{% block title %}{{ 'Edit' if customer else 'Add' }} Customer{% endblock %}
{% block page_title %}{{ 'Edit' if customer else 'Add' }} Customer{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('customers') }}" class="back-link">← Back</a>{% endblock %}
{% block content %}
<form method="post" class="form-card">
  <div class="form-row">
    <div class="form-group"><label class="form-label">Name</label><input name="name" class="form-control" value="{{ customer['name'] if customer else '' }}"></div>
    <div class="form-group"><label class="form-label">Type</label>
      <select name="type" class="form-control">
        <option value="customer" {{ 'selected' if customer and customer['type']=='customer' }}>Customer</option>
        <option value="supplier" {{ 'selected' if customer and customer['type']=='supplier' }}>Supplier</option>
      </select></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Company *</label><input name="company" class="form-control" value="{{ customer['company'] if customer and customer['company'] else '' }}" placeholder="Company / trading name" required></div>
    <div class="form-group"><label class="form-label">VAT Number</label><input name="vat_number" class="form-control" value="{{ customer['vat_number'] if customer and customer['vat_number'] else '' }}" placeholder="e.g. GB123456789"></div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input name="phone" id="cust_phone" type="tel" inputmode="tel"
             class="form-control"
             value="{{ customer['phone'] if customer else '' }}"
             placeholder="+44 7404 614479"
             autocomplete="tel"
             pattern="^[+]?[0-9 ()\-]{7,}$"
             title="Digits, spaces, +, -, ( ) allowed (min 7 digits)">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input name="email" id="cust_email" type="email"
             class="form-control"
             value="{{ customer['email'] if customer else '' }}"
             placeholder="name@example.com"
             autocomplete="email"
             pattern="[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}"
             title="Enter a valid email address (e.g. name@example.com)">
    </div>
  </div>
  <script>
  // Auto-format phone as the user types: keep the leading + if present, group digits in fours
  (function() {
    const phone = document.getElementById('cust_phone');
    if (!phone) return;
    phone.addEventListener('input', function() {
      let v = this.value;
      const hasPlus = v.trim().startsWith('+');
      // Keep only digits
      const digits = v.replace(/\D/g, '');
      // Group digits: country code (first 1-3 digits) then groups of 4
      let formatted = '';
      if (hasPlus && digits.length > 0) {
        // Assume country code is first 1-3 digits, then space + groups of 4
        let cc = digits.slice(0, digits.startsWith('44') ? 2 : (digits.startsWith('1') ? 1 : 2));
        let rest = digits.slice(cc.length);
        formatted = '+' + cc;
        if (rest.length) formatted += ' ' + rest.match(/.{1,4}/g).join(' ');
      } else {
        formatted = digits.match(/.{1,4}/g)?.join(' ') || '';
      }
      this.value = formatted;
    });
    // Quick visual cue if invalid
    phone.addEventListener('blur', function() {
      this.style.borderColor = this.checkValidity() ? '' : '#dc2626';
    });
    document.getElementById('cust_email')?.addEventListener('blur', function() {
      this.style.borderColor = this.checkValidity() ? '' : '#dc2626';
    });
  })();
  </script>
  <div class="form-group"><label class="form-label">Address Line 1</label><input name="address" id="cust_addr1" class="form-control" value="{{ customer['address'] if customer else '' }}" placeholder="Street / building"></div>
  <div class="form-group"><label class="form-label">Address Line 2</label><input name="address2" id="cust_addr2" class="form-control" value="{{ customer['address2'] if customer and customer['address2'] else '' }}" placeholder="Area / estate (optional)"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">City</label><input name="city" id="cust_city" class="form-control" value="{{ customer['city'] if customer and customer['city'] else '' }}"></div>
    <div class="form-group"><label class="form-label">Postcode</label><input name="postcode" id="cust_postcode" class="form-control" value="{{ customer['postcode'] if customer and customer['postcode'] else '' }}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Country</label><input name="country" id="cust_country" class="form-control" value="{{ customer['country'] if customer and customer['country'] else '' }}"></div>
    <div class="form-group"><label class="form-label">Currency</label>
      <select name="currency" class="form-control">
        <option value="GBP" {{ 'selected' if not customer or customer['currency']=='GBP' }}>GBP</option>
        <option value="USD" {{ 'selected' if customer and customer['currency']=='USD' }}>USD</option>
        <option value="EUR" {{ 'selected' if customer and customer['currency']=='EUR' }}>EUR</option>
      </select></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Balance (£)</label><input name="balance" type="number" step="0.01" class="form-control" value="{{ customer['balance'] if customer else '0' }}"></div>
    <div class="form-group"><label class="form-label">Discount (%)</label><input name="discount_pct" type="number" step="0.1" min="0" max="100" class="form-control" value="{{ customer['discount_pct'] if customer else '0' }}"></div>
  </div>
  <div class="form-group"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ customer['notes'] if customer else '' }}</textarea></div>
  <div style="margin-top:18px;display:flex;gap:8px">
    <button type="submit" class="btn btn-primary">{{ 'Save' if customer else 'Add Customer' }}</button>
    <a href="{{ url_for('customers') }}" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
