<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NEON</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: #1a6ef5;
      border-radius: 13px;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.03em;
    }
    .logo p {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 3px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      color: #0f172a;
    }
    input:focus {
      border-color: #1a6ef5;
      box-shadow: 0 0 0 3px rgba(26,110,245,0.12);
    }
    .error {
      background: #fff3f3;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #1a6ef5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { background: #1558cc; }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">📦</div>
      <h1>NEON</h1>
      <p>Sign in to your account</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autofocus autocomplete="username"
               value="{{ request.form.get('username', '') }}" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Sign In</button>
    </form>

  </div>
</body>
</html>
