{% extends 'base.html' %}
{% block title %}Add Discount{% endblock %}
{% block page_title %}Add Discount{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('discounts') }}" class="back-link">← Back</a>{% endblock %}
{% block content %}
<form method="post" class="form-card">
  <div class="form-group"><label class="form-label">Name *</label><input name="name" class="form-control" required placeholder="e.g. Summer Sale"></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Type</label>
      <select name="type" class="form-control">
        <option value="percent">Percentage (%)</option>
        <option value="fixed">Fixed Amount (£)</option>
      </select></div>
    <div class="form-group"><label class="form-label">Value</label><input name="value" type="number" step="0.01" min="0" class="form-control" value="0"></div>
  </div>
  <div class="form-group"><label class="form-label">Applies To</label><input name="applies_to" class="form-control" value="all" placeholder="all / category name"></div>
  <div style="margin-top:18px;display:flex;gap:8px">
    <button type="submit" class="btn btn-primary">Add Discount</button>
    <a href="{{ url_for('discounts') }}" class="btn">Cancel</a>
  </div>
</form>
{% endblock %}
