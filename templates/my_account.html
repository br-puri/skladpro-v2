{% extends 'base.html' %}
{% block title %}My Account{% endblock %}
{% block page_title %}My Account{% endblock %}

{% block content %}
<div style="max-width:480px">
  <div class="form-card">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:4px">{{ session.get('username') }}</h3>
    <p style="font-size:12px;color:#94a3b8;margin-bottom:20px">
      Role: <strong>{{ session.get('role','') | capitalize }}</strong>
    </p>

    <hr class="section">
    <h4 style="font-size:13px;font-weight:600;margin-bottom:14px">Change Password</h4>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input name="current_password" type="password" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input name="new_password" type="password" class="form-control" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input name="confirm_password" type="password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
